<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="cv_filip">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>cv_filip</title>
  <link rel="manifest" href="manifest.json">

  <style>
    @media print {
      @page { margin: 10mm; size: A4; }
      html, body {
        background: white !important;
        height: auto !important;
        overflow: visible !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      flt-glass-pane {
        height: auto !important;
        overflow: visible !important;
        position: static !important;
      }
      flt-scene-host {
        height: auto !important;
        overflow: visible !important;
        position: static !important;
      }
      flt-scene {
        height: auto !important;
        overflow: visible !important;
      }
      canvas {
        height: auto !important;
      }
    }
  </style>
  <script>
    function expandForPrint() {
      ['flt-glass-pane', 'flt-scene-host', 'flt-scene'].forEach(function(sel) {
        var el = document.querySelector(sel);
        if (el) {
          el.setAttribute('data-ph', el.style.height || '');
          el.setAttribute('data-po', el.style.overflow || '');
          el.setAttribute('data-pp', el.style.position || '');
          el.style.height = 'auto';
          el.style.overflow = 'visible';
          el.style.position = 'static';
        }
      });
    }
    function restoreAfterPrint() {
      ['flt-glass-pane', 'flt-scene-host', 'flt-scene'].forEach(function(sel) {
        var el = document.querySelector(sel);
        if (el) {
          el.style.height = el.getAttribute('data-ph') || '';
          el.style.overflow = el.getAttribute('data-po') || '';
          el.style.position = el.getAttribute('data-pp') || '';
        }
      });
    }
    window.addEventListener('beforeprint', expandForPrint);
    window.addEventListener('afterprint', restoreAfterPrint);
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
